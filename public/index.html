<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Web Explorer</title>
<style>
:root {
  --bg:       #1c1c1c;
  --bg2:      #242424;
  --bg3:      #2c2c2c;
  --bg4:      #343434;
  --bg5:      #3c3c3c;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --text:     #e8e8e8;
  --text2:    #a0a0a0;
  --text3:    #666;
  --accent:   #0078d4;
  --accent2:  #1a8fe0;
  --accent-bg:rgba(0,120,212,0.12);
  --danger:   #c42b1c;
  --selected: rgba(0,120,212,0.18);
  --sel-bdr:  rgba(0,120,212,0.6);
  --hover:    rgba(255,255,255,0.05);
  --radius:   6px;
  --rsm:      4px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;}

/* ── TITLEBAR ── */
#titlebar{
  height:36px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;
}
.logo{font-size:14px;font-weight:600;display:flex;align-items:center;gap:5px;letter-spacing:-0.2px;}
.logo-accent{color:var(--accent);}
#titlebar-gap{flex:1;}
.tl-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px 7px;border-radius:var(--rsm);font-size:13px;line-height:1;transition:background .12s,color .12s;}
.tl-btn:hover{background:var(--bg4);color:var(--text);}
.tl-btn.on{color:var(--accent);}

/* ── TOOLBAR ── */
#toolbar{
  height:38px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 8px;gap:2px;flex-shrink:0;
}
.tb-btn{
  background:none;border:none;color:var(--text2);cursor:pointer;
  padding:4px 8px;border-radius:var(--rsm);font-size:12px;
  display:flex;align-items:center;gap:5px;transition:background .12s,color .12s;
  white-space:nowrap;
}
.tb-btn:hover{background:var(--bg4);color:var(--text);}
.tb-btn .ico{font-size:14px;line-height:1;}
.tb-sep{width:1px;background:var(--border2);height:18px;margin:0 4px;flex-shrink:0;}
.tb-btn.primary{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(0,120,212,0.25);}
.tb-btn.primary:hover{background:var(--accent);color:#fff;}
#btn-paste-tb{display:none;}

/* ── MAIN ── */
#main{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{
  width:190px;background:var(--bg2);border-right:1px solid var(--border);
  padding:6px 0;overflow-y:auto;flex-shrink:0;
}
.side-sec{margin-bottom:2px;}
.side-lbl{font-size:10px;color:var(--text3);padding:8px 14px 3px;text-transform:uppercase;letter-spacing:.8px;}
.side-item{
  padding:5px 10px;cursor:pointer;display:flex;align-items:center;gap:7px;
  border-radius:var(--rsm);margin:1px 5px;font-size:12px;color:var(--text2);
  transition:background .1s;white-space:nowrap;overflow:hidden;
}
.side-item:hover{background:var(--hover);color:var(--text);}
.side-item.active{background:var(--accent-bg);color:var(--accent);}
.side-ico{font-size:13px;flex-shrink:0;}

/* ── PANELS ── */
#panels{flex:1;display:flex;overflow:hidden;}
#resizer{width:3px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s;}
#resizer:hover,#resizer.on{background:var(--accent);}

/* ── PANEL ── */
.panel{display:flex;flex-direction:column;overflow:hidden;flex:1;min-width:180px;}
.panel.active-panel .panel-header{background:var(--bg2);}

/* ── TAB BAR ── */
.tabbar{
  background:var(--bg3);border-bottom:1px solid var(--border);
  display:flex;align-items:flex-end;padding:0 6px;gap:1px;
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{display:none;}
.tab{
  background:transparent;border:1px solid transparent;border-bottom:none;
  padding:5px 10px;border-radius:var(--rsm) var(--rsm) 0 0;
  cursor:pointer;font-size:11px;white-space:nowrap;
  display:flex;align-items:center;gap:5px;max-width:150px;
  color:var(--text2);position:relative;bottom:-1px;transition:background .1s,color .1s;
}
.tab:hover{background:var(--bg4);color:var(--text);}
.tab.on{background:var(--bg2);color:var(--text);border-color:var(--border);border-bottom-color:var(--bg2);z-index:1;}
.tab-name{overflow:hidden;text-overflow:ellipsis;max-width:90px;}
.tab-x{font-size:10px;color:var(--text3);padding:1px 2px;border-radius:3px;line-height:1;}
.tab-x:hover{background:var(--bg5);color:var(--text);}
.tab-add{background:none;border:none;color:var(--text3);padding:3px 7px;cursor:pointer;font-size:15px;line-height:1;border-radius:var(--rsm);margin-bottom:2px;}
.tab-add:hover{color:var(--text);background:var(--bg4);}

/* ── BREADCRUMB ── */
.breadcrumb-wrap{
  height:34px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 6px;gap:4px;flex-shrink:0;
}
.nav-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:3px 5px;border-radius:var(--rsm);font-size:13px;line-height:1;transition:background .1s,color .1s;}
.nav-btn:hover:not(:disabled){background:var(--bg4);color:var(--text);}
.nav-btn:disabled{opacity:.3;cursor:default;}

.breadcrumb{
  flex:1;display:flex;align-items:center;gap:1px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);
  padding:3px 6px;overflow:hidden;cursor:default;min-width:0;
  transition:background .1s;
}
.breadcrumb:hover{background:var(--bg4);}
.breadcrumb.editing{display:none;}
.breadcrumb-input{
  flex:1;background:var(--bg3);border:1px solid var(--accent);border-radius:var(--rsm);
  padding:3px 8px;color:var(--text);font-size:12px;outline:none;
  display:none;
}
.breadcrumb-input.editing{display:block;}
.bc-part{
  font-size:12px;color:var(--text2);cursor:pointer;padding:1px 3px;border-radius:3px;
  white-space:nowrap;flex-shrink:0;transition:background .1s,color .1s;
}
.bc-part:hover{background:var(--accent-bg);color:var(--accent);}
.bc-part.last{color:var(--text);font-weight:500;}
.bc-sep{color:var(--text3);font-size:10px;flex-shrink:0;padding:0 1px;}

.search-box{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);
  padding:3px 8px 3px 24px;color:var(--text);font-size:12px;outline:none;
  width:150px;transition:border-color .15s,width .2s;position:relative;
}
.search-box:focus{border-color:var(--accent);width:190px;}
.search-wrap{position:relative;flex-shrink:0;}
.search-ico{position:absolute;left:7px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:11px;pointer-events:none;}

/* ── FILE LIST ── */
.list-wrap{flex:1;overflow-y:auto;overflow-x:hidden;}
.ftable{width:100%;border-collapse:collapse;}
.ftable thead th{
  background:var(--bg3);padding:5px 10px;text-align:left;
  color:var(--text2);font-weight:400;border-bottom:1px solid var(--border);
  position:sticky;top:0;cursor:pointer;user-select:none;z-index:2;font-size:11px;
}
.ftable thead th:hover{color:var(--text);}
.sa{font-size:9px;margin-left:2px;}
.ftable tbody tr{border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background .07s;}
.ftable tbody tr:hover{background:var(--hover);}
.ftable tbody tr:hover .row-actions{opacity:1;}
.ftable tbody tr.sel{background:var(--selected);outline:1px solid var(--sel-bdr);}
.ftable tbody tr.drop-target{background:rgba(0,120,212,.2)!important;outline:2px dashed var(--accent);}
.ftable td{padding:4px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;}
.ftable td:first-child{width:99%;}
.fname{display:flex;align-items:center;gap:7px;}
.ficon{font-size:14px;flex-shrink:0;line-height:1;}
.fnametext{overflow:hidden;text-overflow:ellipsis;}
.fmuted{color:var(--text2);}
.row-actions{opacity:0;display:flex;gap:2px;transition:opacity .1s;}
.ra-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:3px;font-size:11px;transition:background .1s,color .1s;}
.ra-btn:hover{background:var(--bg5);color:var(--text);}
.ra-btn.del:hover{background:rgba(196,43,28,.2);color:#f08080;}

/* ── STATUS ── */
.pstatus{
  height:22px;background:var(--bg2);border-top:1px solid var(--border);
  padding:0 10px;font-size:11px;color:var(--text3);
  display:flex;align-items:center;gap:16px;flex-shrink:0;
}

/* ── CONTEXT MENU ── */
#ctx{
  position:fixed;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius);padding:4px;min-width:210px;z-index:999;
  box-shadow:0 8px 32px rgba(0,0,0,.55);display:none;
}
#ctx.open{display:block;}
.ci{
  padding:6px 12px;border-radius:var(--rsm);cursor:pointer;
  display:flex;align-items:center;gap:9px;font-size:12px;color:var(--text);
  transition:background .08s;
}
.ci:hover{background:var(--accent-bg);color:var(--accent);}
.ci.red:hover{background:rgba(196,43,28,.15);color:#f08080;}
.ci-ico{width:15px;text-align:center;font-size:13px;flex-shrink:0;}
.ci-sc{margin-left:auto;color:var(--text3);font-size:10px;}
.csep{height:1px;background:var(--border);margin:3px 6px;}

/* ── MODAL ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:800;}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:22px;min-width:340px;max-width:480px;width:90vw;box-shadow:0 16px 48px rgba(0,0,0,.6);}
.modal h3{font-size:14px;font-weight:600;margin-bottom:14px;}
.modal label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;}
.modal input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);padding:7px 10px;font-size:13px;outline:none;margin-bottom:14px;}
.modal input[type=text]:focus{border-color:var(--accent);}
.mbtns{display:flex;gap:8px;justify-content:flex-end;}
.mbtn{padding:6px 16px;border-radius:var(--rsm);cursor:pointer;font-size:12px;border:none;}
.mbtn.ok{background:var(--accent);color:#fff;}
.mbtn.ok:hover{background:var(--accent2);}
.mbtn.cancel{background:var(--bg4);color:var(--text);border:1px solid var(--border2);}
.mbtn.cancel:hover{background:var(--bg5);}
.props-grid{display:grid;grid-template-columns:100px 1fr;gap:5px 10px;font-size:12px;margin-bottom:14px;}
.pk{color:var(--text2);}
.pv{color:var(--text);word-break:break-all;}

/* ── IMG PREVIEW ── */
#imgprev{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:900;cursor:zoom-out;}
#imgprev.open{display:flex;}
#imgprev img{max-width:90vw;max-height:90vh;border-radius:8px;}

/* ── TOAST ── */
#toasts{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:7px;z-index:1000;}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 14px;font-size:12px;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px;animation:tin .2s ease;max-width:300px;}
.toast.ok{border-left:3px solid #3a9f3a;}
.toast.err{border-left:3px solid var(--danger);}
@keyframes tin{from{transform:translateX(16px);opacity:0}to{transform:none;opacity:1}}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--border2);}
</style>
</head>
<body>

<!-- TITLEBAR -->
<div id="titlebar">
  <div class="logo">🗂 <span class="logo-accent">Web</span>Explorer</div>
  <div id="titlebar-gap"></div>
  <button class="tl-btn" id="tl-sidebar" onclick="toggleSidebar()" title="Sidebar (S)">☰</button>
  <button class="tl-btn" id="tl-dual" onclick="toggleDual()" title="Dual Panel (D)">⊞</button>
  <button class="tl-btn" onclick="showSettings()" title="Ρυθμίσεις">⚙</button>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tb-btn" onclick="AP().goBack()" title="Πίσω (Alt+←)"><span class="ico">‹</span></button>
  <button class="tb-btn" onclick="AP().goForward()" title="Μπροστά (Alt+→)"><span class="ico">›</span></button>
  <button class="tb-btn" onclick="AP().goUp()" title="Επάνω (Alt+↑)"><span class="ico">↑</span> Επάνω</button>
  <button class="tb-btn" onclick="AP().refresh()" title="Ανανέωση (F5)"><span class="ico">⟳</span></button>
  <div class="tb-sep"></div>
  <button class="tb-btn primary" onclick="showNewFolder()"><span class="ico">📁</span> Νέος Φάκελος</button>
  <button class="tb-btn" onclick="triggerUpload()"><span class="ico">⬆</span> Upload</button>
  <input id="upl-inp" type="file" multiple style="display:none" onchange="doUpload(this.files)">
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-paste-tb" onclick="doPaste()"><span class="ico">📌</span> Επικόλληση</button>
</div>

<!-- MAIN -->
<div id="main">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="side-sec">
      <div class="side-lbl">Γρήγορη Πρόσβαση</div>
      <div class="side-item" onclick="AP().navigate(hd)"><span class="side-ico">🏠</span>Αρχική</div>
      <div class="side-item" onclick="AP().navigate(hd+'\\Desktop')"><span class="side-ico">🖥️</span>Επιφάνεια Εργ.</div>
      <div class="side-item" onclick="AP().navigate(hd+'\\Documents')"><span class="side-ico">📁</span>Έγγραφα</div>
      <div class="side-item" onclick="AP().navigate(hd+'\\Downloads')"><span class="side-ico">⬇️</span>Λήψεις</div>
      <div class="side-item" onclick="AP().navigate(hd+'\\Pictures')"><span class="side-ico">🖼️</span>Εικόνες</div>
    </div>
    <div class="side-sec">
      <div class="side-lbl">Δίσκοι</div>
      <div id="drives"></div>
    </div>
  </div>

  <!-- PANELS -->
  <div id="panels">
    <div id="panel-left" class="panel active-panel"></div>
    <div id="resizer" style="display:none"></div>
    <div id="panel-right" class="panel" style="display:none"></div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx">
  <div class="ci" id="ci-open"><span class="ci-ico">📂</span>Άνοιγμα</div>
  <div class="csep"></div>
  <div class="ci" id="ci-copy"><span class="ci-ico">📋</span>Αντιγραφή<span class="ci-sc">Ctrl+C</span></div>
  <div class="ci" id="ci-cut"><span class="ci-ico">✂️</span>Αποκοπή<span class="ci-sc">Ctrl+X</span></div>
  <div class="ci" id="ci-paste"><span class="ci-ico">📌</span>Επικόλληση<span class="ci-sc">Ctrl+V</span></div>
  <div class="csep"></div>
  <div class="ci" id="ci-rename"><span class="ci-ico">✏️</span>Μετονομασία<span class="ci-sc">F2</span></div>
  <div class="ci red" id="ci-del"><span class="ci-ico">🗑️</span>Διαγραφή<span class="ci-sc">Del</span></div>
  <div class="csep"></div>
  <div class="ci" id="ci-mkdir"><span class="ci-ico">📁</span>Νέος Φάκελος</div>
  <div class="csep"></div>
  <div class="ci" id="ci-props"><span class="ci-ico">ℹ️</span>Ιδιότητες<span class="ci-sc">Alt+Enter</span></div>
</div>

<!-- IMG PREVIEW -->
<div id="imgprev" onclick="this.classList.remove('open')">
  <img id="imgprev-src" src="" alt="">
</div>

<!-- TOAST -->
<div id="toasts"></div>

<!-- MODAL ROOT -->
<div id="mroot"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS & STATE
// ═══════════════════════════════════════════════════════
const IMGS = new Set(['.jpg','.jpeg','.png','.gif','.bmp','.webp','.svg','.ico']);
let hd = 'C:\\Users';
let dual = false, sidebarOn = true;
let activePID = 'left';
let clip = null;
let dragSrc = null;
const panels = {};

// ═══════════════════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════════════════
class Panel {
  constructor(id) {
    this.id = id;
    this.el = document.getElementById('panel-' + id);
    this.tabs = [this.newTabData(hd)];
    this.ti = 0;
    this.render();
    this.load(hd);
  }

  get t() { return this.tabs[this.ti]; }

  newTabData(path) {
    return { path, hist:[], fut:[], items:[], sel:null, sk:'name', sa:true, name:'...' };
  }

  // ── Build panel DOM ──────────────────────────────────
  render() {
    this.el.innerHTML = `
      <div class="tabbar" id="tb-${this.id}"></div>
      <div class="breadcrumb-wrap">
        <button class="nav-btn" id="bb-${this.id}" onclick="panels.${this.id}.goBack()">‹</button>
        <button class="nav-btn" id="bf-${this.id}" onclick="panels.${this.id}.goForward()">›</button>
        <button class="nav-btn" onclick="panels.${this.id}.goUp()">↑</button>
        <div class="breadcrumb" id="bc-${this.id}" onclick="panels.${this.id}.editAddr()"></div>
        <input class="breadcrumb-input" id="bci-${this.id}" type="text"
          onblur="panels.${this.id}.leaveAddr()"
          onkeydown="panels.${this.id}.addrKey(event)">
        <div class="search-wrap">
          <span class="search-ico">🔍</span>
          <input class="search-box" id="srch-${this.id}" type="text" placeholder="Αναζήτηση..."
            onkeydown="if(event.key==='Enter')panels.${this.id}.doSearch(this.value)">
        </div>
      </div>
      <div class="list-wrap" id="lw-${this.id}"
        ondragover="event.preventDefault()"
        ondrop="panels.${this.id}.dropOnPanel(event)"
        oncontextmenu="ctxEmpty(event,'${this.id}')">
        <table class="ftable">
          <thead><tr>
            <th onclick="panels.${this.id}.sort('name')">Όνομα <span class="sa" id="sa-name-${this.id}">↑</span></th>
            <th onclick="panels.${this.id}.sort('modified')" style="width:150px">Τροπ/ση <span class="sa" id="sa-mod-${this.id}"></span></th>
            <th onclick="panels.${this.id}.sort('size')" style="width:80px">Μέγεθος <span class="sa" id="sa-sz-${this.id}"></span></th>
            <th onclick="panels.${this.id}.sort('ext')" style="width:65px">Τύπος <span class="sa" id="sa-ext-${this.id}"></span></th>
            <th style="width:60px"></th>
          </tr></thead>
          <tbody id="body-${this.id}"></tbody>
        </table>
      </div>
      <div class="pstatus">
        <span id="sc-${this.id}">0 στοιχεία</span>
        <span id="ss-${this.id}"></span>
      </div>`;
    this.renderTabs();
  }

  // ── Tabs ─────────────────────────────────────────────
  renderTabs() {
    document.getElementById('tb-' + this.id).innerHTML =
      this.tabs.map((t,i) => `
        <div class="tab ${i===this.ti?'on':''}" onclick="panels.${this.id}.switchTab(${i})">
          <span class="tab-name">${t.name}</span>
          ${this.tabs.length>1?`<span class="tab-x" onclick="event.stopPropagation();panels.${this.id}.closeTab(${i})">✕</span>`:''}
        </div>`).join('') +
      `<button class="tab-add" onclick="panels.${this.id}.addTab()" title="Ctrl+T">＋</button>`;
  }

  addTab(path) {
    this.tabs.push(this.newTabData(path||hd));
    this.ti = this.tabs.length - 1;
    this.renderTabs();
    this.load(path||hd);
  }

  switchTab(i) { this.ti = i; this.renderTabs(); this.renderFiles(); this.renderBreadcrumb(); }

  closeTab(i) {
    this.tabs.splice(i, 1);
    if (this.ti >= this.tabs.length) this.ti = this.tabs.length - 1;
    this.renderTabs(); this.renderFiles(); this.renderBreadcrumb();
  }

  // ── Load ─────────────────────────────────────────────
  async load(p) {
    try {
      const r = await fetch('/api/list?path=' + encodeURIComponent(p));
      const d = await r.json();
      if (d.error) { toast('Σφάλμα: ' + d.error, 'err'); return; }
      this.t.path = d.path;
      this.t.items = d.items;
      this.t.sel = null;
      this.t.name = d.path.split('\\').filter(Boolean).pop() || d.path;
      renderDrives(d.drives);
      this.renderTabs();
      this.renderBreadcrumb();
      this.renderFiles();
      this.updateNav();
    } catch(e) { toast('Σφάλμα σύνδεσης', 'err'); }
  }

  navigate(p) {
    if (!p) return;
    this.t.hist.push(this.t.path);
    this.t.fut = [];
    this.load(p);
  }

  goBack() { if (this.t.hist.length) { this.t.fut.push(this.t.path); this.load(this.t.hist.pop()); } }
  goForward() { if (this.t.fut.length) { this.t.hist.push(this.t.path); this.load(this.t.fut.pop()); } }
  goUp() {
    const p = this.t.path;
    const up = /^[A-Z]:\\$/.test(p) ? p : p.replace(/\\[^\\]+$/, '') || p.slice(0,3);
    if (up !== p) this.navigate(up);
  }
  refresh() { this.load(this.t.path); }

  updateNav() {
    const bb = document.getElementById('bb-' + this.id);
    const bf = document.getElementById('bf-' + this.id);
    if (bb) bb.disabled = !this.t.hist.length;
    if (bf) bf.disabled = !this.t.fut.length;
  }

  // ── Breadcrumb ───────────────────────────────────────
  renderBreadcrumb() {
    const bc = document.getElementById('bc-' + this.id);
    if (!bc) return;
    const parts = this.t.path.split('\\').filter(Boolean);
    // Reconstruct paths: C:\ , C:\Users , C:\Users\gioko ...
    let html = '';
    parts.forEach((part, i) => {
      const fullPath = parts.slice(0, i+1).join('\\') + (i===0?'\\':'');
      const isLast = i === parts.length - 1;
      html += `<span class="bc-part${isLast?' last':''}" onclick="event.stopPropagation();panels.${this.id}.navigate('${esc(fullPath)}')" title="${fullPath}">${part}</span>`;
      if (!isLast) html += `<span class="bc-sep">›</span>`;
    });
    bc.innerHTML = html;
  }

  editAddr() {
    const bc = document.getElementById('bc-' + this.id);
    const inp = document.getElementById('bci-' + this.id);
    bc.classList.add('editing');
    inp.classList.add('editing');
    inp.value = this.t.path;
    inp.focus(); inp.select();
  }

  leaveAddr() {
    const bc = document.getElementById('bc-' + this.id);
    const inp = document.getElementById('bci-' + this.id);
    setTimeout(() => { bc.classList.remove('editing'); inp.classList.remove('editing'); }, 150);
  }

  addrKey(e) {
    if (e.key === 'Enter') { this.navigate(e.target.value); e.target.blur(); }
    if (e.key === 'Escape') { e.target.blur(); }
  }

  // ── Files ────────────────────────────────────────────
  renderFiles() {
    const items = [...this.t.items].sort((a,b) => {
      if (a.isDir && !b.isDir) return -1;
      if (!a.isDir && b.isDir) return 1;
      let va = a[this.t.sk], vb = b[this.t.sk];
      if (this.t.sk==='size'){va=a.size;vb=b.size;}
      if (va<vb) return this.t.sa?-1:1;
      if (va>vb) return this.t.sa?1:-1;
      return 0;
    });

    ['name','mod','sz','ext'].forEach(k => {
      const el = document.getElementById('sa-'+k+'-'+this.id);
      if (el) el.textContent = '';
    });
    const skMap = {name:'name',modified:'mod',size:'sz',ext:'ext'};
    const arrow = document.getElementById('sa-'+(skMap[this.t.sk]||'name')+'-'+this.id);
    if (arrow) arrow.textContent = this.t.sa ? '↑' : '↓';

    const body = document.getElementById('body-' + this.id);
    if (!body) return;

    body.innerHTML = items.map(item => `
      <tr id="r-${this.id}-${sid(item.name)}"
        class="${this.t.sel===item.name?'sel':''}"
        onclick="panels.${this.id}.select('${esc(item.name)}')"
        ondblclick="panels.${this.id}.open('${esc(item.name)}')"
        oncontextmenu="ctxShow(event,'${this.id}','${esc(item.name)}')"
        draggable="true"
        ondragstart="panels.${this.id}.dragStart(event,'${esc(item.name)}')"
        ondragover="panels.${this.id}.dragOver(event,'${esc(item.name)}')"
        ondragleave="panels.${this.id}.dragLeave(event,'${esc(item.name)}')"
        ondrop="panels.${this.id}.dropOn(event,'${esc(item.name)}')">
        <td><div class="fname"><span class="ficon">${fIcon(item)}</span><span class="fnametext">${item.name}</span></div></td>
        <td class="fmuted">${fDate(item.modified)}</td>
        <td class="fmuted">${item.isDir?'':fSize(item.size)}</td>
        <td class="fmuted">${item.ext?item.ext.slice(1).toUpperCase():(item.isDir?'Φάκελος':'')}</td>
        <td><div class="row-actions">
          <button class="ra-btn" onclick="event.stopPropagation();raRename('${this.id}','${esc(item.name)}')" title="Μετονομασία">✏</button>
          <button class="ra-btn del" onclick="event.stopPropagation();raDel('${this.id}','${esc(item.name)}')" title="Διαγραφή">🗑</button>
        </div></td>
      </tr>`).join('');

    const cnt = items.length, files = items.filter(i=>!i.isDir).length;
    document.getElementById('sc-' + this.id).textContent = cnt + ' στοιχεία' + (files?` (${files} αρχεία)`:'');
    document.getElementById('ss-' + this.id).textContent = this.t.sel ? 'Επιλ.: ' + this.t.sel : '';
  }

  sort(k) {
    if (this.t.sk===k) this.t.sa = !this.t.sa;
    else { this.t.sk=k; this.t.sa=true; }
    this.renderFiles();
  }

  select(name) {
    this.t.sel = name;
    setAP(this.id);
    document.querySelectorAll('.panel.active-panel').forEach(p=>p.classList.remove('active-panel'));
    this.el.classList.add('active-panel');
    this.renderFiles();
  }

  open(name) {
    const item = this.t.items.find(i=>i.name===name);
    if (!item) return;
    if (item.isDir) this.navigate(this.t.path+'\\'+name);
    else if (IMGS.has(item.ext)) {
      document.getElementById('imgprev-src').src = '/api/image?path='+encodeURIComponent(this.t.path+'\\'+name);
      document.getElementById('imgprev').classList.add('open');
    }
  }

  // ── Drag & Drop ──────────────────────────────────────
  dragStart(e, name) {
    dragSrc = { srcDir: this.t.path, name, pid: this.id };
    e.dataTransfer.effectAllowed = 'move';
  }

  dragOver(e, name) {
    e.preventDefault();
    const item = this.t.items.find(i=>i.name===name);
    if (item?.isDir) document.getElementById('r-'+this.id+'-'+sid(name))?.classList.add('drop-target');
  }

  dragLeave(e, name) {
    document.getElementById('r-'+this.id+'-'+sid(name))?.classList.remove('drop-target');
  }

  async dropOn(e, name) {
    e.preventDefault();
    if (!dragSrc) return;
    const item = this.t.items.find(i=>i.name===name);
    const dest = item?.isDir ? this.t.path+'\\'+name : this.t.path;
    await apiMove(dragSrc.srcDir, dragSrc.name, dest);
    dragSrc = null;
    panels.left?.refresh(); panels.right?.refresh();
  }

  async dropOnPanel(e) {
    e.preventDefault();
    if (!dragSrc || dragSrc.srcDir === this.t.path) return;
    await apiMove(dragSrc.srcDir, dragSrc.name, this.t.path);
    dragSrc = null;
    panels.left?.refresh(); panels.right?.refresh();
  }

  async doSearch(q) {
    if (!q) { this.refresh(); return; }
    const r = await fetch('/api/search?dir='+encodeURIComponent(this.t.path)+'&query='+encodeURIComponent(q));
    const d = await r.json();
    this.t.items = d.results.map(r=>({name:r.name+' ('+r.path+')',isDir:r.isDir,size:0,modified:'',ext:''}));
    this.renderFiles();
  }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function initPanels() {
  panels.left = new Panel('left');
  fetch('/api/list?path=').then(r=>r.json()).then(d => {
    hd = d.path.split('\\').slice(0,3).join('\\') || d.path;
    renderDrives(d.drives);
  });
}

function AP() { return panels[activePID] || panels.left; }
function setAP(id) { activePID = id; }

// ═══════════════════════════════════════════════════════
// DUAL PANEL
// ═══════════════════════════════════════════════════════
function toggleDual() {
  dual = !dual;
  const res = document.getElementById('resizer');
  const rp = document.getElementById('panel-right');
  const btn = document.getElementById('tl-dual');
  if (dual) {
    res.style.display = 'block'; rp.style.display = 'flex'; btn.classList.add('on');
    if (!panels.right) panels.right = new Panel('right');
    initResizer();
  } else {
    res.style.display = 'none'; rp.style.display = 'none'; btn.classList.remove('on');
    document.getElementById('panel-left').style.cssText = 'flex:1';
  }
}

function toggleSidebar() {
  sidebarOn = !sidebarOn;
  document.getElementById('sidebar').style.display = sidebarOn ? 'block' : 'none';
  document.getElementById('tl-sidebar').classList.toggle('on', sidebarOn);
}

function initResizer() {
  const res = document.getElementById('resizer');
  const lp = document.getElementById('panel-left');
  let drag=false, sx, sw;
  res.onmousedown = e => { drag=true; sx=e.clientX; sw=lp.offsetWidth; res.classList.add('on'); document.body.style.userSelect='none'; };
  document.addEventListener('mousemove', e => { if (!drag) return; lp.style.cssText=`flex:none;width:${Math.max(180,sw+e.clientX-sx)}px`; });
  document.addEventListener('mouseup', () => { if (drag) { drag=false; res.classList.remove('on'); document.body.style.userSelect=''; } });
}

// ═══════════════════════════════════════════════════════
// FILE OPERATIONS
// ═══════════════════════════════════════════════════════
async function apiMove(srcDir, name, destDir) {
  const r = await fetch('/api/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({srcDir,name,destDir})});
  const d = await r.json();
  if (d.ok) toast('↔ Μετακινήθηκε: '+name,'ok');
  else toast('Σφάλμα: '+d.error,'err');
}

async function apiCopy(srcDir, name, destDir) {
  const r = await fetch('/api/copy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({srcDir,name,destDir})});
  const d = await r.json();
  if (d.ok) { toast('📋 Αντιγράφηκε: '+name,'ok'); panels.left?.refresh(); panels.right?.refresh(); }
  else toast('Σφάλμα: '+d.error,'err');
}

async function apiDelete(dir, name) {
  const r = await fetch('/api/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dir,name})});
  const d = await r.json();
  if (d.ok) { toast('🗑 Διαγράφηκε: '+name,'ok'); panels.left?.refresh(); panels.right?.refresh(); }
  else toast('Σφάλμα: '+d.error,'err');
}

function showNewFolder() {
  showModal('Νέος Φάκελος','Νέος φάκελος', async name => {
    if (!name) return;
    const r = await fetch('/api/mkdir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dir:AP().t.path,name})});
    const d = await r.json();
    if (d.ok) { toast('📁 Δημιουργήθηκε: '+name,'ok'); AP().refresh(); }
    else toast('Σφάλμα: '+d.error,'err');
  });
}

function triggerUpload() { document.getElementById('upl-inp').click(); }
async function doUpload(files) {
  const fd = new FormData();
  for (const f of files) fd.append('files',f);
  const r = await fetch('/api/upload?path='+encodeURIComponent(AP().t.path),{method:'POST',body:fd});
  const d = await r.json();
  if (d.ok) { toast('⬆ Ανέβηκαν '+d.count+' αρχεία','ok'); AP().refresh(); }
}

// Clipboard
function copyClip() { const p=AP(); if (!p.t.sel) return; clip={op:'copy',srcDir:p.t.path,name:p.t.sel}; updatePaste(); toast('📋 Αντιγραφή: '+p.t.sel); }
function cutClip()  { const p=AP(); if (!p.t.sel) return; clip={op:'cut', srcDir:p.t.path,name:p.t.sel}; updatePaste(); toast('✂️ Αποκοπή: '+p.t.sel); }
async function doPaste() {
  if (!clip) return;
  const dest = AP().t.path;
  if (clip.op==='copy') await apiCopy(clip.srcDir,clip.name,dest);
  else { await apiMove(clip.srcDir,clip.name,dest); clip=null; }
  updatePaste();
  panels.left?.refresh(); panels.right?.refresh();
}
function updatePaste() {
  const show = !!clip;
  document.getElementById('btn-paste-tb').style.display = show?'flex':'none';
}

// Row action helpers
function raRename(pid, name) {
  showModal('Μετονομασία', name, async n => {
    if (!n||n===name) return;
    const r = await fetch('/api/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dir:panels[pid].t.path,oldName:name,newName:n})});
    const d = await r.json();
    if (d.ok) { toast('✏️ '+n,'ok'); panels[pid].refresh(); }
    else toast('Σφάλμα: '+d.error,'err');
  });
}
function raDel(pid, name) { if (confirm('Διαγραφή "'+name+'";')) apiDelete(panels[pid].t.path, name); }

// ═══════════════════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════════════════
let ctxPID=null, ctxName=null;

function ctxShow(e, pid, name) {
  e.preventDefault(); e.stopPropagation();
  ctxPID=pid; ctxName=name;
  setAP(pid); panels[pid].select(name);
  const item = panels[pid].t.items.find(i=>i.name===name);
  document.getElementById('ci-paste').style.display = clip?'flex':'none';
  ['ci-open','ci-copy','ci-cut','ci-rename','ci-del'].forEach(id=>document.getElementById(id).style.display='flex');
  const m = document.getElementById('ctx');
  m.classList.add('open');
  let x=e.clientX, y=e.clientY;
  if (x+220>window.innerWidth) x=window.innerWidth-225;
  if (y+260>window.innerHeight) y=window.innerHeight-265;
  m.style.left=x+'px'; m.style.top=y+'px';
}

function ctxEmpty(e, pid) {
  e.preventDefault();
  ctxPID=pid; ctxName=null;
  document.getElementById('ci-paste').style.display = clip?'flex':'none';
  ['ci-open','ci-copy','ci-cut','ci-rename','ci-del'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('ci-mkdir').style.display='flex';
  const m=document.getElementById('ctx');
  m.classList.add('open');
  m.style.left=e.clientX+'px'; m.style.top=e.clientY+'px';
}

function ctxClose() {
  document.getElementById('ctx').classList.remove('open');
  ['ci-open','ci-copy','ci-cut','ci-rename','ci-del','ci-mkdir'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='flex';});
}

document.getElementById('ci-open').onclick   = ()=>{ ctxClose(); panels[ctxPID].open(ctxName); };
document.getElementById('ci-copy').onclick   = ()=>{ ctxClose(); clip={op:'copy',srcDir:panels[ctxPID].t.path,name:ctxName}; updatePaste(); toast('📋 Αντιγραφή: '+ctxName); };
document.getElementById('ci-cut').onclick    = ()=>{ ctxClose(); clip={op:'cut',srcDir:panels[ctxPID].t.path,name:ctxName}; updatePaste(); toast('✂️ Αποκοπή: '+ctxName); };
document.getElementById('ci-paste').onclick  = ()=>{ ctxClose(); doPaste(); };
document.getElementById('ci-rename').onclick = ()=>{ ctxClose(); raRename(ctxPID, ctxName); };
document.getElementById('ci-del').onclick    = ()=>{ ctxClose(); if (confirm('Διαγραφή "'+ctxName+'";')) apiDelete(panels[ctxPID].t.path, ctxName); };
document.getElementById('ci-mkdir').onclick  = ()=>{ ctxClose(); showNewFolder(); };
document.getElementById('ci-props').onclick  = async ()=>{
  ctxClose();
  const r = await fetch('/api/props?path='+encodeURIComponent(panels[ctxPID].t.path+'\\'+ctxName));
  const d = await r.json();
  showModal('Ιδιότητες',null,null,`<div class="props-grid">
    <span class="pk">Όνομα:</span><span class="pv">${d.name}</span>
    <span class="pk">Τύπος:</span><span class="pv">${d.isDir?'Φάκελος':(d.ext||'Αρχείο')}</span>
    <span class="pk">Τοποθεσία:</span><span class="pv">${d.fullPath}</span>
    <span class="pk">Μέγεθος:</span><span class="pv">${d.isDir?'—':fSize(d.size)}</span>
    <span class="pk">Δημιουργία:</span><span class="pv">${fDate(d.created)}</span>
    <span class="pk">Τροποποίηση:</span><span class="pv">${fDate(d.modified)}</span>
  </div>`);
};

document.addEventListener('click', e=>{ if (!document.getElementById('ctx').contains(e.target)) ctxClose(); });

// ═══════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  const p = AP();
  if (e.key==='F5') { e.preventDefault(); p.refresh(); }
  if (e.key==='F2' && p.t.sel) raRename(p.id, p.t.sel);
  if (e.key==='Delete' && p.t.sel) { if (confirm('Διαγραφή "'+p.t.sel+'";')) apiDelete(p.t.path, p.t.sel); }
  if (e.ctrlKey && e.key==='c') copyClip();
  if (e.ctrlKey && e.key==='x') cutClip();
  if (e.ctrlKey && e.key==='v') doPaste();
  if (e.ctrlKey && e.key==='t') { e.preventDefault(); p.addTab(); }
  if (e.ctrlKey && e.key==='w') { e.preventDefault(); if (p.tabs.length>1) p.closeTab(p.ti); }
  if (e.key==='Escape') { document.getElementById('imgprev').classList.remove('open'); ctxClose(); }
  if (e.altKey && e.key==='ArrowLeft') { e.preventDefault(); p.goBack(); }
  if (e.altKey && e.key==='ArrowRight') { e.preventDefault(); p.goForward(); }
  if (e.altKey && e.key==='ArrowUp') { e.preventDefault(); p.goUp(); }
  if (e.altKey && e.key==='Enter' && p.t.sel) document.getElementById('ci-props').click();
});

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function renderDrives(drives) {
  if (!drives?.length) return;
  document.getElementById('drives').innerHTML = drives.map(d=>
    `<div class="side-item" onclick="AP().navigate('${d.replace(/\\/g,'\\\\')}')" ><span class="side-ico">💾</span>${d}</div>`).join('');
}

function fIcon(item) {
  if (item.isDir) return '📁';
  const e = item.ext;
  if (IMGS.has(e)) return '🖼️';
  if (['.mp3','.wav','.flac','.ogg','.aac'].includes(e)) return '🎵';
  if (['.mp4','.avi','.mkv','.mov','.wmv'].includes(e)) return '🎬';
  if (['.pdf'].includes(e)) return '📄';
  if (['.zip','.rar','.7z','.tar','.gz'].includes(e)) return '🗜️';
  if (['.exe','.msi'].includes(e)) return '⚙️';
  if (['.js','.ts','.py','.html','.css','.json','.xml','.cs','.cpp','.java','.php'].includes(e)) return '💻';
  if (['.doc','.docx'].includes(e)) return '📝';
  if (['.xls','.xlsx'].includes(e)) return '📊';
  if (['.ppt','.pptx'].includes(e)) return '📊';
  if (['.txt','.log','.md'].includes(e)) return '📃';
  return '📄';
}

function fSize(b) {
  if (!b) return '';
  if (b<1024) return b+' B';
  if (b<1048576) return (b/1024).toFixed(1)+' KB';
  if (b<1073741824) return (b/1048576).toFixed(1)+' MB';
  return (b/1073741824).toFixed(2)+' GB';
}

function fDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('el-GR')+' '+d.toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'});
}

function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function sid(s) { return (s||'').replace(/[^a-zA-Z0-9_-]/g,'_'); }

function toast(msg, type='') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2600);
}

function showModal(title, defVal, onOk, custom) {
  document.getElementById('mroot').innerHTML = `
    <div class="moverlay" onclick="if(event.target===this)document.getElementById('mroot').innerHTML=''">
      <div class="modal">
        <h3>${title}</h3>
        ${custom||`<label>Όνομα</label><input type="text" id="m-inp" value="${(defVal||'').replace(/"/g,'&quot;')}">`}
        <div class="mbtns">
          <button class="mbtn cancel" onclick="document.getElementById('mroot').innerHTML=''">Άκυρο</button>
          ${onOk?`<button class="mbtn ok" id="m-ok">OK</button>`:`<button class="mbtn ok" onclick="document.getElementById('mroot').innerHTML=''">Κλείσιμο</button>`}
        </div>
      </div>
    </div>`;
  if (onOk) {
    const ok = document.getElementById('m-ok');
    ok.onclick = ()=>{ const v=document.getElementById('m-inp').value; document.getElementById('mroot').innerHTML=''; onOk(v); };
    const inp = document.getElementById('m-inp');
    if (inp) { inp.focus(); inp.select(); inp.onkeydown=e=>{ if(e.key==='Enter')ok.click(); if(e.key==='Escape')document.getElementById('mroot').innerHTML=''; }; }
  }
}

function showSettings() {
  showModal('Ρυθμίσεις',null,null,`
    <p style="font-size:12px;color:var(--text2);margin-bottom:14px">Επιλογές context menu</p>
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;cursor:pointer"><input type="checkbox" checked> Αντιγραφή / Αποκοπή</label>
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;cursor:pointer"><input type="checkbox" checked> Ιδιότητες</label>
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12px;cursor:pointer"><input type="checkbox" checked> Νέος Φάκελος</label>
  `);
}

initPanels();
